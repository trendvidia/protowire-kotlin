name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pin the sibling Java port checkout to the tag matching this
  # module's release line. Composite-build via includeBuild needs the
  # path ../protowire-java to exist with this ref checked out.
  PROTOWIRE_JAVA_REF: v0.70.0

jobs:
  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          path: protowire-kotlin

      # Sibling protowire-java checkout — settings.gradle.kts looks at
      # ../protowire-java relative to the kotlin repo's root, so we
      # need both repos checked out as siblings under the workspace.
      - name: Checkout protowire-java
        uses: actions/checkout@v6
        with:
          repository: trendvidia/protowire-java
          ref: ${{ env.PROTOWIRE_JAVA_REF }}
          path: protowire-java

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: ./gradlew build
        working-directory: protowire-kotlin
        run: ./gradlew --no-daemon build
